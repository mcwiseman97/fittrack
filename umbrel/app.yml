manifestVersion: 1
id: fittrack
category: fitness
name: FitTrack
version: "1.0.0"
tagline: Workout & nutrition tracker for your home server
description: >-
  FitTrack is a sleek, self-hosted workout and nutrition tracking app.
  Log workouts with sets/reps/weight, track macros and calories for every meal,
  build custom routines, and review your progress over time — all without sending
  data to any third party.

  Features:
  • Workout logging with rest timer, personal-best detection, and progress charts
  • Nutrition diary with custom foods, macro targets, and daily summaries
  • Consistency heatmap and dashboard overview
  • Full JSON + CSV data export / import
  • Dark-mode-first UI optimised for phone and desktop

developer: Self-hosted
website: https://github.com/your-username/fittrack
dependencies: []
repo: https://github.com/your-username/fittrack
support: https://github.com/your-username/fittrack/issues
port: 3080
gallery:
